# Development configuration
services:
  client:
    image: benjaminderprogrammierer/webontour-client:dev
    container_name: webontour-client-dev
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    ports:
      - '${CLIENT_PORT}:${CLIENT_PORT}'
    environment:
      - NODE_ENV=development
      - PORT=${CLIENT_PORT}
      - VITE_API_URL=http://server:${SERVER_PORT}
    networks:
      - webontour_network
    volumes:
      - ./client:/app
      - /app/node_modules # do not mount node_modules to avoid conflicts
    depends_on:
      server:
        condition: service_healthy

  server:
    image: benjaminderprogrammierer/webontour-server:dev
    container_name: webontour-server-dev
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    # API is not exposed to the host machine - this is handled by a reverse proxy in the client service
    # ports:
    #   - '${SERVER_PORT}:${SERVER_PORT}'
    environment:
      - NODE_ENV=development
      - PORT=${SERVER_PORT}
    env_file:
      - .env
    networks:
      - webontour_network
    volumes:
      - ./server:/app
      - /app/node_modules
      - ./storage/attachments:/attachments
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${SERVER_PORT}/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:latest
    container_name: webontour-db
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    networks:
      - webontour_network
    volumes:
      - ./storage/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  webontour_network:
    name: webontour-network
    driver: bridge
